services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-init:
    image: ${IMAGE_PREFIX:-__PROJECT_NAME__}-db-init:local
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@postgres:5432/${POSTGRES_DB:-app}
      APP_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@postgres:5432/${POSTGRES_DB:-app}
      ROOT_IDENTIFIER: ${ROOT_IDENTIFIER:-test}
      ROOT_PASSWORD: ${ROOT_PASSWORD:-12345678}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  backend:
    image: ${IMAGE_PREFIX:-__PROJECT_NAME__}-backend:local
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ${IMAGE_PREFIX:-__PROJECT_NAME__}-web:local
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:19878}
      AUTH_UPSTREAM: ${AUTH_UPSTREAM:-http://1.85.61.130:29001}
      FILE_UPSTREAM: ${FILE_UPSTREAM:-http://1.85.61.130:29002}
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-8080}:80"

  admin:
    image: ${IMAGE_PREFIX:-__PROJECT_NAME__}-admin:local
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:19878}
      AUTH_UPSTREAM: ${AUTH_UPSTREAM:-http://1.85.61.130:29001}
      FILE_UPSTREAM: ${FILE_UPSTREAM:-http://1.85.61.130:29002}
    depends_on:
      - backend
    ports:
      - "${ADMIN_PORT:-8081}:80"
